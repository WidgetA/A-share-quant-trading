# Docker Compose Example — A-Share Trading System
# Copy to docker-compose.yml and fill in secrets before deploying.
# NOTE: docker-compose.yml is gitignored (contains passwords/tokens).

services:
  trading-service:
    image: your-registry/trading-service:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      # 数据库配置 (PostgreSQL / PolarDB)
      - DB_HOST=your-db-host
      - DB_PORT=5432
      - DB_USER=your-db-user
      - DB_PASSWORD=your-db-password
      - DB_NAME=your-db-name
      # 日志级别
      - LOG_LEVEL=INFO
      # 策略配置
      - TOTAL_CAPITAL=10000000
      - NUM_SLOTS=5
      # 飞书告警配置 (可选)
      - FEISHU_APP_ID=
      - FEISHU_APP_SECRET=
      - FEISHU_CHAT_ID=
      # Web UI 配置
      - WEB_ENABLED=true
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
      - WEB_BASE_URL=http://your-server-ip:8000
      - INTERACTION_MODE=web
      # GreptimeDB (回测数据缓存)
      - GREPTIME_HOST=greptimedb
      - GREPTIME_PORT=4003
      # 时区
      - TZ=Asia/Shanghai
    volumes:
      - trading-data:/app/data
      - trading-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - greptimedb
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  greptimedb:
    image: greptime/greptimedb:latest
    restart: always
    expose:
      - "4000"
      - "4003"
    volumes:
      - greptime-wal:/tmp/greptimedb
      - ./config/greptimedb.toml:/etc/greptimedb/config.toml:ro
    command: >
      standalone start
      --config-file /etc/greptimedb/config.toml
      --http-addr 0.0.0.0:4000
      --rpc-addr 0.0.0.0:4001
      --mysql-addr 0.0.0.0:4002
      --postgres-addr 0.0.0.0:4003
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai

  watchtower:
    image: containrrr/watchtower:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    command: --interval 60 --label-enable --cleanup
    environment:
      - TZ=Asia/Shanghai

volumes:
  trading-data:
  trading-logs:
  greptime-wal:
