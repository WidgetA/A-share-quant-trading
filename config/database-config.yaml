# Database Configuration
# This file configures database connections for the strategy platform.

database:
  # V15 scan history (uses 'trading' schema)
  trading:
    host: "${DB_HOST:localhost}"
    port: ${DB_PORT:5432}
    database: "${DB_NAME:messages}"
    user: "${DB_USER:reader}"
    password: "${DB_PASSWORD}"
    pool_min_size: 2
    pool_max_size: 5
    schema: "trading"
    auto_create_schema: true  # Create schema if not exists

  # Stock fundamentals (read-only, populated by external process)
  fundamentals:
    host: "${DB_HOST:localhost}"
    port: ${DB_PORT:5432}
    database: "${DB_NAME:messages}"
    user: "${DB_USER:reader}"
    password: "${DB_PASSWORD}"
    pool_min_size: 2
    pool_max_size: 5
    schema: "public"

# GreptimeDB — backtest data cache (daily OHLCV + minute bars)
greptimedb:
  host: "${GREPTIME_HOST:localhost}"
  port: ${GREPTIME_PORT:4000}
  database: "public"
