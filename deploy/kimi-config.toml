# Kimi Code CLI config for the CONTAINER (path B / listing verify).
#
# Why this exists: `kimi login` writes ~/.kimi/config.toml locally (provider +
# default model). The container only receives the OAuth *credentials*
# (credentials/kimi-code.json via the upload endpoint), NOT this config — so a
# headless `kimi --print` run had no model → "LLM not set" → it never ran the
# model/tools and falsely looked like "查不到". Baking this config (it has NO
# secrets — all api_key="" ; auth is the uploaded OAuth token file) fixes that.
#
# Copied verbatim from a working local `~/.kimi/config.toml`. Auth still comes
# from the uploaded /root/.kimi/credentials/kimi-code.json (oauth key
# "oauth/kimi-code", storage=file).

default_model = "kimi-code/kimi-for-coding"
default_thinking = true
default_yolo = false
skip_afk_prompt_injection = false
default_plan_mode = false
default_editor = ""
theme = "dark"
show_thinking_stream = true
hooks = []
merge_all_available_skills = true
extra_skill_dirs = []
telemetry = true

[models."kimi-code/kimi-for-coding"]
provider = "managed:kimi-code"
model = "kimi-for-coding"
max_context_size = 262144
capabilities = ["video_in", "image_in", "thinking"]
display_name = "Kimi-k2.6"

[providers."managed:kimi-code"]
type = "kimi"
base_url = "https://api.kimi.com/coding/v1"
api_key = ""

[providers."managed:kimi-code".oauth]
storage = "file"
key = "oauth/kimi-code"

[loop_control]
max_steps_per_turn = 100
max_retries_per_step = 3
max_ralph_iterations = 0
reserved_context_size = 50000
compaction_trigger_ratio = 0.85

[services.moonshot_search]
base_url = "https://api.kimi.com/coding/v1/search"
api_key = ""

[services.moonshot_search.oauth]
storage = "file"
key = "oauth/kimi-code"

[services.moonshot_fetch]
base_url = "https://api.kimi.com/coding/v1/fetch"
api_key = ""

[services.moonshot_fetch.oauth]
storage = "file"
key = "oauth/kimi-code"

[mcp.client]
tool_call_timeout_ms = 60000
