edition: 3.0.0
name: ml-training-serverless
access: default

resources:
  ml-training:
    component: fc3
    props:
      region: cn-shanghai
      functionName: ashare_mltrain
      runtime: custom-container
      timeout: 1500
      memorySize: 16384
      cpu: 4
      diskSize: 10240
      customContainerConfig:
        image: ${env.ACR_IMAGE}
        port: 9000
