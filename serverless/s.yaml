edition: 3.0.0
name: ml-training-serverless
access: default

resources:
  ml-training:
    component: fc3
    props:
      region: cn-shanghai
      functionName: ashare_mltrain
      runtime: custom-container
      timeout: 600
      memorySize: 4096
      cpu: 1
      diskSize: 10240
      customContainerConfig:
        image: ${env.ACR_IMAGE}
        port: 9000
