{% extends "base.html" %}

{% block title %}交易笔记{% endblock %}

{% block content %}
<div class="trade-notes-root">
    <div class="trade-notes-header">
        <h2>交易笔记</h2>
        <span class="hint">点股票看一脉相承的全部交易历史与思考。买入/卖出由系统自动记录，思考/复盘可手动追加。</span>
        <span class="tn-export">
            <a href="/trade-notes/backfill" class="tn-icon-btn" style="text-decoration:none" title="按日期表格批量补录历史买卖/费用">📋 补作业</a>
            <input id="tnExportStart" type="date" title="导出开始日期（北京时间）" />
            <span>→</span>
            <input id="tnExportEnd" type="date" title="导出结束日期（北京时间，含当天）" />
            <button id="tnExportBtn" class="tn-icon-btn" title="导出区间内所有事件为 JSON 日志">⬇ 导出</button>
        </span>
    </div>

    <div class="trade-notes-grid" id="tnGrid">
        <!-- Left pane: stocks -->
        <section class="tn-pane tn-pane-stocks">
            <header class="tn-pane-header">
                <span>股票</span>
                <span class="tn-actions">
                    <button id="tnAddStock" class="tn-icon-btn" title="新增股票（手工补一笔买入/卖出）">+</button>
                    <button id="tnEditStockCode" class="tn-icon-btn" title="改正当前股票代码（输错纠正）" disabled>✎</button>
                    <button id="tnBackfillToday" class="tn-icon-btn" title="回补今日成交订单到笔记（幂等）">⤓</button>
                    <button id="tnRefreshStocks" class="tn-icon-btn" title="刷新">↻</button>
                </span>
            </header>
            <div class="tn-filter-bar">
                <input id="tnFilterDate" type="date" title="只显示这天有事件的股票（清空=全部）" />
            </div>
            <div class="tn-pane-body" id="tnStocks">
                <div class="tn-empty">加载中…</div>
            </div>
        </section>

        <!-- Middle pane: events -->
        <section class="tn-pane tn-pane-events">
            <header class="tn-pane-header">
                <span id="tnEventsTitle">事件</span>
                <button id="tnAddEvent" class="tn-icon-btn" title="新增事件" disabled>+</button>
            </header>
            <div class="tn-pane-body" id="tnEvents">
                <div class="tn-empty">← 选一只股票</div>
            </div>
        </section>

        <!-- Right pane: content -->
        <section class="tn-pane tn-pane-content">
            <header class="tn-pane-header">
                <span id="tnContentTitle">正文</span>
                <span class="tn-actions">
                    <button id="tnAddCardBtn" class="tn-icon-btn" title="插入带时间的卡片（不新建事件）" disabled>+卡片</button>
                    <button id="tnEditBtn" class="tn-icon-btn" title="编辑" disabled>✎</button>
                    <button id="tnDeleteBtn" class="tn-icon-btn tn-danger" title="删除" disabled>🗑</button>
                </span>
            </header>
            <div class="tn-pane-body" id="tnContent">
                <div class="tn-empty">← 选一条事件</div>
            </div>
        </section>
    </div>

    <!-- Manual timestamped card (篇 view, stored in note_cards table) -->
    <div class="tn-modal-backdrop" id="tnCardModal" hidden>
        <div class="tn-modal">
            <h3 id="tnCardModalTitle">插入带时间的卡片</h3>
            <label>时间
                <input id="tnCardTs" type="datetime-local" step="60" />
            </label>
            <label>内容 (markdown)
                <textarea id="tnCardContent" rows="8" placeholder="想法 / 观察 / 提醒…"></textarea>
            </label>
            <div class="tn-modal-actions">
                <button id="tnCardDelete" class="tn-danger" hidden>删除</button>
                <button id="tnCardCancel">取消</button>
                <button id="tnCardSave" class="primary">插入</button>
            </div>
        </div>
    </div>

    <!-- New event modal -->
    <div class="tn-modal-backdrop" id="tnNewModal" hidden>
        <div class="tn-modal">
            <h3>新增事件</h3>
            <label>类型
                <select id="tnNewType">
                    {% for t in event_types %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>时间
                <input id="tnNewTs" type="datetime-local" step="60" />
            </label>
            <div id="tnNewTradeFields" hidden>
                <div class="tn-modal-row">
                    <label>价格
                        <input id="tnNewPrice" type="number" step="0.01" min="0" placeholder="留空=市价" />
                    </label>
                    <label>数量
                        <input id="tnNewQty" type="number" step="100" min="0" placeholder="股数" />
                    </label>
                    <label id="tnNewCommissionLabel">佣金
                        <input id="tnNewCommission" type="number" step="0.01" min="0" placeholder="元" />
                    </label>
                    <label id="tnNewTransferFeeLabel">过户费
                        <input id="tnNewTransferFee" type="number" step="0.01" min="0" placeholder="元" />
                    </label>
                </div>
                <div id="tnNewSellFields" class="tn-modal-row" hidden>
                    <label id="tnNewStampTaxLabel">印花税
                        <input id="tnNewStampTax" type="number" step="0.01" min="0" placeholder="元 (仅卖)" />
                    </label>
                    <label id="tnNewDividendLabel">股息/股息税
                        <input id="tnNewDividend" type="number" step="0.01" placeholder="净到手，可负" />
                    </label>
                    <label class="tn-pnl-label"><span id="tnNewPnlLabelText">平仓收益</span>
                        <span class="tn-pnl-input-group">
                            <input id="tnNewRealizedPnl" type="number" step="0.01" placeholder="元" />
                            <button id="tnNewCalcPnlBtn" type="button" class="tn-calc-btn" title="按上一次买入按比例分摊成本计算">计算</button>
                        </span>
                    </label>
                </div>
            </div>
            <label>标题（可选，留空自动生成）
                <input id="tnNewTitle" type="text" placeholder="买入/卖出 自动按 @价格 x 数量 拼接" />
            </label>
            <label>对内 (markdown)
                <textarea id="tnNewContent" rows="6" placeholder="思路 / 观察 / 反思…"></textarea>
            </label>
            <label>对外 (markdown)
                <textarea id="tnNewContentExternal" rows="6" placeholder="对外说法 / 分享版本…"></textarea>
            </label>
            <div class="tn-modal-actions">
                <button id="tnNewCancel">取消</button>
                <button id="tnNewSave" class="primary">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    'use strict';

    const state = {
        currentCode: null,
        currentEventId: null,
        editing: false,
        documentEvents: [],
        documentCards: [],
        documentSaveTimer: null,
        documentSaving: false,
        documentDirtyWhileSaving: false,
        // Set when the card modal opens in edit mode (click on existing card);
        // null in create mode (+卡片 button).
        editingCardId: null,
    };

    const dom = {
        stocks: document.getElementById('tnStocks'),
        events: document.getElementById('tnEvents'),
        content: document.getElementById('tnContent'),
        eventsTitle: document.getElementById('tnEventsTitle'),
        contentTitle: document.getElementById('tnContentTitle'),
        addEventBtn: document.getElementById('tnAddEvent'),
        editBtn: document.getElementById('tnEditBtn'),
        deleteBtn: document.getElementById('tnDeleteBtn'),
        refreshStocksBtn: document.getElementById('tnRefreshStocks'),
        backfillTodayBtn: document.getElementById('tnBackfillToday'),
        addStockBtn: document.getElementById('tnAddStock'),
        editStockCodeBtn: document.getElementById('tnEditStockCode'),
        filterDate: document.getElementById('tnFilterDate'),
        modal: document.getElementById('tnNewModal'),
        newType: document.getElementById('tnNewType'),
        newTs: document.getElementById('tnNewTs'),
        newTradeFields: document.getElementById('tnNewTradeFields'),
        newSellFields: document.getElementById('tnNewSellFields'),
        newPrice: document.getElementById('tnNewPrice'),
        newQty: document.getElementById('tnNewQty'),
        newCommission: document.getElementById('tnNewCommission'),
        newTransferFee: document.getElementById('tnNewTransferFee'),
        newStampTax: document.getElementById('tnNewStampTax'),
        newDividend: document.getElementById('tnNewDividend'),
        newRealizedPnl: document.getElementById('tnNewRealizedPnl'),
        newCalcPnlBtn: document.getElementById('tnNewCalcPnlBtn'),
        newTitle: document.getElementById('tnNewTitle'),
        newContent: document.getElementById('tnNewContent'),
        newContentExternal: document.getElementById('tnNewContentExternal'),
        newCancel: document.getElementById('tnNewCancel'),
        newSave: document.getElementById('tnNewSave'),
        addCardBtn: document.getElementById('tnAddCardBtn'),
        cardModal: document.getElementById('tnCardModal'),
        cardModalTitle: document.getElementById('tnCardModalTitle'),
        cardTs: document.getElementById('tnCardTs'),
        cardContent: document.getElementById('tnCardContent'),
        cardCancel: document.getElementById('tnCardCancel'),
        cardSave: document.getElementById('tnCardSave'),
        cardDelete: document.getElementById('tnCardDelete'),
        exportStart: document.getElementById('tnExportStart'),
        exportEnd: document.getElementById('tnExportEnd'),
        exportBtn: document.getElementById('tnExportBtn'),
    };

    function escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    // Minimal markdown render: headings, bold, italic, code, line breaks.
    // Intentionally tiny — full markdown can come later if needed.
    function renderMarkdown(md) {
        let html = escapeHtml(md);
        html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\n\n/g, '</p><p>');
        html = html.replace(/\n/g, '<br>');
        return '<p>' + html + '</p>';
    }

    function formatDateTime(iso) {
        const d = new Date(iso);
        const yy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${yy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function eventTsMs(ev) {
        return new Date(ev.ts).getTime();
    }

    function isTradeEvent(ev) {
        return ev.event_type === '\u4e70\u5165' || ev.event_type === '\u5356\u51fa' ||
            ev.event_type === '\u9006\u56de\u8d2d' ||
            ev.side === 'buy' || ev.side === 'sell';
    }

    function isRepoEvent(ev) {
        return ev.event_type === '\u9006\u56de\u8d2d';
    }

    function isCommentEvent(ev) {
        return ev.event_type === '\u8bc4\u8bba';
    }

    function tradeTypeLabel(ev) {
        if (isRepoEvent(ev)) return '\u9006\u56de\u8d2d';
        if (ev.event_type === '\u4e70\u5165' || ev.side === 'buy') return '\u4e70\u5165';
        if (ev.event_type === '\u5356\u51fa' || ev.side === 'sell') return '\u5356\u51fa';
        return ev.event_type || '\u4ea4\u6613';
    }

    function tradeMetaText(ev) {
        const meta = [];
        if (ev.price !== null && ev.price !== undefined) meta.push(`@${ev.price}`);
        if (ev.qty !== null && ev.qty !== undefined) meta.push(`x ${ev.qty}`);
        meta.push(formatDateTime(ev.ts));
        return meta.join('  ');
    }

    // 费用/股息/平仓收益小一行，只在至少有一项非空时渲染。
    // 逆回购只显示收益（realized_pnl），费项对它不适用。
    function feeRowHtml(ev) {
        const isSell = ev.side === 'sell' || ev.event_type === '卖出';
        const isRepo = isRepoEvent(ev);
        const parts = [];
        const fmt = (v) => Number(v).toFixed(2);
        if (ev.commission !== null && ev.commission !== undefined) {
            parts.push(`佣金 ${fmt(ev.commission)}`);
        }
        if (ev.transfer_fee !== null && ev.transfer_fee !== undefined) {
            parts.push(`过户费 ${fmt(ev.transfer_fee)}`);
        }
        if (isSell) {
            if (ev.stamp_tax !== null && ev.stamp_tax !== undefined) {
                parts.push(`印花税 ${fmt(ev.stamp_tax)}`);
            }
            if (ev.dividend !== null && ev.dividend !== undefined) {
                parts.push(`股息/税 ${fmt(ev.dividend)}`);
            }
        }
        let pnlHtml = '';
        if ((isSell || isRepo) && ev.realized_pnl !== null && ev.realized_pnl !== undefined) {
            const cls = ev.realized_pnl >= 0 ? 'tn-pnl-positive' : 'tn-pnl-negative';
            const pnlLabel = isRepo ? '收益' : '平仓收益';
            pnlHtml = `<span class="${cls}">${pnlLabel} ${fmt(ev.realized_pnl)}</span>`;
        }
        if (!parts.length && !pnlHtml) return '';
        const sep = parts.length && pnlHtml ? ' · ' : '';
        return `<div class="tn-doc-trade-fees">${parts.map(escapeHtml).join(' · ')}${sep}${pnlHtml}</div>`;
    }

    function cmtTitle(content) {
        const firstLine = (content || '').split(/\r?\n/).map(s => s.trim()).find(Boolean);
        return firstLine ? firstLine.slice(0, 80) : '\u8bc4\u8bba';
    }

    function getSegmentText(el) {
        return (el.innerText || '')
            .replace(/\r\n/g, '\n')
            .replace(/\u00a0/g, ' ')
            .replace(/\u200b/g, '')
            .replace(/\n+$/g, '');
    }

    // Render segment text with inline-styled 【YYYY-MM-DD HH:mm】 markers.
    // The marker spans are presentational only — innerText still extracts the
    // raw bracketed text on save, so the persisted cmt content is unchanged.
    const TS_MARKER_RE = /【\d{4}-\d{2}-\d{2} \d{2}:\d{2}】/g;
    function renderSegmentText(el, text) {
        el.textContent = '';
        if (!text) return;
        const lines = text.split('\n');
        lines.forEach((line, idx) => {
            if (idx > 0) el.appendChild(document.createElement('br'));
            if (!line) return;
            TS_MARKER_RE.lastIndex = 0;
            let lastEnd = 0;
            let m;
            while ((m = TS_MARKER_RE.exec(line)) !== null) {
                if (m.index > lastEnd) {
                    el.appendChild(document.createTextNode(line.slice(lastEnd, m.index)));
                }
                const span = document.createElement('span');
                span.className = 'tn-doc-marker-ts';
                span.textContent = m[0];
                el.appendChild(span);
                lastEnd = m.index + m[0].length;
            }
            if (lastEnd < line.length) {
                el.appendChild(document.createTextNode(line.slice(lastEnd)));
            }
        });
    }

    function adjacentAnchorTimes(nodes, index) {
        let prev = null;
        let next = null;
        for (let i = index - 1; i >= 0; i--) {
            if (nodes[i].dataset.kind === 'trade' || nodes[i].dataset.kind === 'card') {
                prev = Number(nodes[i].dataset.tsMs);
                break;
            }
        }
        for (let i = index + 1; i < nodes.length; i++) {
            if (nodes[i].dataset.kind === 'trade' || nodes[i].dataset.kind === 'card') {
                next = Number(nodes[i].dataset.tsMs);
                break;
            }
        }
        return { prev, next };
    }

    function midpointTsMs(prev, next) {
        if (Number.isFinite(prev) && Number.isFinite(next)) return Math.floor((prev + next) / 2);
        if (Number.isFinite(next)) return next - 60000;
        if (Number.isFinite(prev)) return prev + 60000;
        return Date.now();
    }

    function placeCaretAtStart(el) {
        const range = document.createRange();
        const selection = window.getSelection();
        range.selectNodeContents(el);
        range.collapse(true);
        selection.removeAllRanges();
        selection.addRange(range);
    }

    async function fetchJSON(url, opts) {
        const resp = await fetch(url, Object.assign({ cache: 'no-store' }, opts || {}));
        if (!resp.ok) {
            const text = await resp.text().catch(() => '');
            throw new Error(`${resp.status} ${text}`);
        }
        return resp.json();
    }

    async function loadStocks() {
        dom.stocks.innerHTML = '<div class="tn-empty">加载中…</div>';
        try {
            const date = (dom.filterDate.value || '').trim();
            const url = date ? `/api/notes/stocks?date=${encodeURIComponent(date)}` : '/api/notes/stocks';
            const data = await fetchJSON(url);
            if (!data.stocks.length) {
                dom.stocks.innerHTML = `<div class="tn-empty">${date ? '该日期无事件' : '暂无笔记'}</div>`;
                return;
            }
            dom.stocks.innerHTML = data.stocks.map(s => `
                <div class="tn-stock-row" data-code="${escapeHtml(s.code)}">
                    <div class="tn-stock-code">
                        ${escapeHtml(s.code)}
                        ${s.name ? `<span class="tn-stock-name">${escapeHtml(s.name)}</span>` : ''}
                    </div>
                    <div class="tn-stock-meta">
                        ${s.event_count} 事件 · ${formatDateTime(s.last_ts)}
                    </div>
                </div>
            `).join('');
            dom.stocks.querySelectorAll('.tn-stock-row').forEach(el => {
                el.addEventListener('click', () => selectStock(el.dataset.code));
            });
        } catch (e) {
            dom.stocks.innerHTML = `<div class="tn-empty tn-error">加载失败: ${escapeHtml(e.message)}</div>`;
        }
    }

    async function selectStock(code) {
        state.currentCode = code;
        state.currentEventId = null;
        state.editing = false;
        dom.stocks.querySelectorAll('.tn-stock-row').forEach(el => {
            el.classList.toggle('active', el.dataset.code === code);
        });
        dom.eventsTitle.textContent = `事件 · ${code}`;
        dom.addEventBtn.disabled = false;
        dom.editStockCodeBtn.disabled = false;
        dom.events.innerHTML = '<div class="tn-empty">加载中…</div>';
        dom.content.innerHTML = '<div class="tn-empty">加载中…</div>';
        dom.editBtn.disabled = true;
        dom.deleteBtn.disabled = true;
        dom.addCardBtn.disabled = false;

        try {
            const [eventsData, cardsData] = await Promise.all([
                fetchJSON(`/api/notes/${encodeURIComponent(code)}/events`),
                // Best-effort: if note_cards table isn't ready yet on a fresh
                // deploy, treat as no cards rather than failing the whole load.
                fetchJSON(`/api/notes/${encodeURIComponent(code)}/cards`).catch(() => ({ cards: [] })),
            ]);
            state.documentEvents = (eventsData.events || []).slice().sort((a, b) => eventTsMs(a) - eventTsMs(b));
            state.documentCards = (cardsData.cards || []).slice()
                .sort((a, b) => new Date(a.ts).getTime() - new Date(b.ts).getTime());
            renderDocumentEditor(code, state.documentEvents, state.documentCards);

            const trades = state.documentEvents.filter(isTradeEvent);
            if (!trades.length) {
                dom.events.innerHTML = '<div class="tn-empty">无事件，点 + 新增</div>';
                return;
            }
            dom.events.innerHTML = trades.map(ev => {
                const sideCls = ev.event_type === '买入' ? 'buy'
                    : (ev.event_type === '卖出' ? 'sell'
                        : (ev.event_type === '逆回购' ? 'repo' : 'other'));
                const titleText = ev.title || ev.event_type;
                const dot = ev.has_content ? '●' : '○';
                const isSell = ev.side === 'sell' || ev.event_type === '卖出';
                let pnlHtml = '';
                if ((isSell || isRepoEvent(ev)) && ev.realized_pnl !== null && ev.realized_pnl !== undefined) {
                    const pnlCls = ev.realized_pnl >= 0 ? 'tn-pnl-positive' : 'tn-pnl-negative';
                    const sign = ev.realized_pnl >= 0 ? '+' : '';
                    pnlHtml = `<span class="tn-event-pnl ${pnlCls}">${sign}${Number(ev.realized_pnl).toFixed(2)}</span>`;
                }
                return `
                    <div class="tn-event-row" data-id="${escapeHtml(ev.event_id)}">
                        <div class="tn-event-line1">
                            <span class="tn-event-type tn-tag-${sideCls}">${escapeHtml(ev.event_type)}</span>
                            <span class="tn-event-line1-right">
                                ${pnlHtml}
                                <span class="tn-event-dot">${dot}</span>
                            </span>
                        </div>
                        <div class="tn-event-title">${escapeHtml(titleText)}</div>
                        <div class="tn-event-time">${formatDateTime(ev.ts)}</div>
                    </div>
                `;
            }).join('');
            dom.events.querySelectorAll('.tn-event-row').forEach(el => {
                el.addEventListener('click', () => selectEvent(el.dataset.id));
            });
        } catch (e) {
            dom.events.innerHTML = `<div class="tn-empty tn-error">加载失败: ${escapeHtml(e.message)}</div>`;
        }
    }

    function renderDocumentEditor(code, events, cards) {
        clearTimeout(state.documentSaveTimer);
        dom.contentTitle.textContent = `\u7bc7 \u00b7 ${code}`;
        dom.editBtn.disabled = true;
        dom.deleteBtn.disabled = true;

        const trades = events.filter(isTradeEvent);
        const comments = events.filter(isCommentEvent);

        // Anchors are the locked blocks (trades + manual cards). Comments
        // are typeable prose segments that fill the gaps between anchors.
        const anchors = [
            ...trades.map(t => ({ kind: 'trade', item: t, ts: eventTsMs(t) })),
            ...(cards || []).map(c => ({ kind: 'card', item: c, ts: new Date(c.ts).getTime() })),
        ].sort((a, b) => a.ts - b.ts);

        const buckets = Array.from({ length: anchors.length + 1 }, () => []);
        comments.forEach(cmt => {
            const ts = eventTsMs(cmt);
            let i = anchors.findIndex(a => a.ts > ts);
            if (i === -1) i = anchors.length;
            buckets[i].push(cmt);
        });
        buckets.forEach(b => b.sort((x, y) => eventTsMs(x) - eventTsMs(y)));

        const editor = document.createElement('div');
        editor.id = 'tnDocumentEditor';
        editor.className = 'tn-document-editor';
        editor.contentEditable = 'true';
        editor.spellcheck = false;

        // Each cmt gets its own segment. An empty bucket renders one empty
        // segment so the user can type to create a new cmt at that gap
        // (auto-midpoint ts via the existing save flow).
        const appendSegment = (cmt) => {
            const segment = document.createElement('div');
            segment.className = 'tn-doc-segment tn-doc-node';
            segment.dataset.kind = 'segment';
            if (cmt) {
                segment.dataset.cmtId = cmt.event_id;
                segment.dataset.tsMs = String(eventTsMs(cmt));
                segment.dataset.originalContent = cmt.content || '';
                renderSegmentText(segment, cmt.content || '');
            }
            editor.appendChild(segment);
        };

        const appendTrade = (trade) => {
            const card = document.createElement('div');
            const isSell = trade.side === 'sell' || trade.event_type === '卖出';
            const cardCls = isRepoEvent(trade) ? 'repo' : (isSell ? 'sell' : 'buy');
            card.className = `tn-doc-trade-card tn-doc-node ${cardCls}`;
            card.contentEditable = 'false';
            card.dataset.kind = 'trade';
            card.dataset.eventId = trade.event_id;
            card.dataset.tsMs = String(eventTsMs(trade));
            card.tabIndex = 0;

            const header = document.createElement('div');
            header.className = 'tn-doc-trade-card-header';
            const label = document.createElement('span');
            label.className = 'tn-doc-trade-label';
            label.textContent = tradeTypeLabel(trade);
            const meta = document.createElement('span');
            meta.className = 'tn-doc-trade-meta';
            meta.textContent = tradeMetaText(trade);
            header.appendChild(label);
            header.appendChild(meta);
            card.appendChild(header);

            // 费用/股息/平仓收益小一行，紧贴 header 下、正文 markdown 上
            const fees = feeRowHtml(trade);
            if (fees) {
                const feeDiv = document.createElement('div');
                feeDiv.innerHTML = fees;
                if (feeDiv.firstChild) card.appendChild(feeDiv.firstChild);
            }

            // If this trade has its own content (notes typed in the per-event
            // editor), render both 对内 / 对外 inline so 篇 view doesn't hide
            // them. Read-only — editing goes through the per-event editor on
            // click. Section labels only appear when both halves have text;
            // if only one is filled, render it bare (less noisy).
            const hasInternal = !!trade.content;
            const hasExternal = !!trade.content_external;
            if (hasInternal || hasExternal) {
                const body = document.createElement('div');
                body.className = 'tn-doc-trade-card-body';
                let html = '';
                if (hasInternal && hasExternal) {
                    html += '<div class="tn-doc-section-label">对内</div>';
                    html += renderMarkdown(trade.content);
                    html += '<div class="tn-doc-section-label">对外</div>';
                    html += renderMarkdown(trade.content_external);
                } else if (hasInternal) {
                    html = renderMarkdown(trade.content);
                } else {
                    html += '<div class="tn-doc-section-label">对外</div>';
                    html += renderMarkdown(trade.content_external);
                }
                body.innerHTML = html;
                card.appendChild(body);
            }

            card.addEventListener('click', () => selectEvent(card.dataset.eventId));
            card.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    selectEvent(card.dataset.eventId);
                }
            });
            editor.appendChild(card);
        };

        const appendCard = (card) => {
            const block = document.createElement('div');
            block.className = 'tn-doc-manual-card tn-doc-node';
            block.contentEditable = 'false';
            block.dataset.kind = 'card';
            block.dataset.cardId = card.card_id;
            block.dataset.tsMs = String(new Date(card.ts).getTime());
            block.tabIndex = 0;

            const header = document.createElement('div');
            header.className = 'tn-doc-trade-card-header';
            const tsSpan = document.createElement('span');
            tsSpan.className = 'tn-doc-marker-ts';
            tsSpan.textContent = `【${formatDateTime(card.ts)}】`;
            header.appendChild(tsSpan);
            block.appendChild(header);

            if (card.content) {
                const body = document.createElement('div');
                body.className = 'tn-doc-trade-card-body';
                body.innerHTML = renderMarkdown(card.content);
                block.appendChild(body);
            }

            block.addEventListener('click', () => openCardEditModal(card));
            block.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openCardEditModal(card);
                }
            });
            editor.appendChild(block);
        };

        const renderBucket = (bucket) => {
            if (bucket.length === 0) {
                appendSegment(null);
            } else {
                bucket.forEach(cmt => appendSegment(cmt));
            }
        };

        anchors.forEach((a, i) => {
            renderBucket(buckets[i]);
            if (a.kind === 'trade') appendTrade(a.item);
            else appendCard(a.item);
        });
        renderBucket(buckets[anchors.length]);

        editor.addEventListener('input', scheduleDocumentSave);
        editor.addEventListener('blur', () => saveDocumentNow(), true);
        // Enter must stay inside the current segment as a soft line break.
        // Chrome's default would insert a sibling <div> at the editor level,
        // which the save walker (':scope > .tn-doc-node') skips → text loss.
        editor.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.isComposing) {
                e.preventDefault();
                document.execCommand('insertLineBreak');
                scheduleDocumentSave();
            }
        });

        dom.content.innerHTML = '';
        dom.content.appendChild(editor);
        editor.focus();
        placeCaretAtStart(editor.querySelector('.tn-doc-segment') || editor);
    }

    function scheduleDocumentSave() {
        if (!state.currentCode || state.currentEventId) return;
        clearTimeout(state.documentSaveTimer);
        state.documentSaveTimer = setTimeout(() => saveDocumentNow(), 800);
    }

    async function saveDocumentNow() {
        clearTimeout(state.documentSaveTimer);
        const editor = document.getElementById('tnDocumentEditor');
        if (!editor || !state.currentCode || state.currentEventId) return;
        if (state.documentSaving) {
            state.documentDirtyWhileSaving = true;
            return;
        }

        const code = state.currentCode;
        const nodes = Array.from(editor.querySelectorAll(':scope > .tn-doc-node'));
        const tasks = [];

        nodes.forEach((node, index) => {
            if (node.dataset.kind !== 'segment') return;
            const content = getSegmentText(node);
            const trimmed = content.trim();
            const cmtId = node.dataset.cmtId || '';
            const originalContent = node.dataset.originalContent || '';

            if (cmtId && !trimmed) {
                tasks.push(fetchJSON(`/api/notes/${encodeURIComponent(code)}/events/${encodeURIComponent(cmtId)}`, {
                    method: 'DELETE',
                }).then(() => {
                    delete node.dataset.cmtId;
                    delete node.dataset.tsMs;
                    node.dataset.originalContent = '';
                }));
                return;
            }

            if (cmtId && content !== originalContent) {
                tasks.push(fetchJSON(`/api/notes/${encodeURIComponent(code)}/events/${encodeURIComponent(cmtId)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: cmtTitle(content), content }),
                }).then(() => {
                    node.dataset.originalContent = content;
                }));
                return;
            }

            if (!cmtId && trimmed) {
                const { prev, next } = adjacentAnchorTimes(nodes, index);
                const tsMs = midpointTsMs(prev, next);
                tasks.push(fetchJSON(`/api/notes/${encodeURIComponent(code)}/events`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event_type: '\u8bc4\u8bba',
                        title: cmtTitle(content),
                        content,
                        author: 'user',
                        source: 'user',
                        ts_ms: tsMs,
                    }),
                }).then(data => {
                    node.dataset.cmtId = data.event_id;
                    node.dataset.tsMs = String(tsMs);
                    node.dataset.originalContent = content;
                }));
            }
        });

        if (!tasks.length) return;

        state.documentSaving = true;
        state.documentDirtyWhileSaving = false;
        try {
            await Promise.all(tasks);
            if (state.documentDirtyWhileSaving) {
                scheduleDocumentSave();
            }
        } catch (e) {
            console.error('document save failed', e);
        } finally {
            state.documentSaving = false;
        }
    }

    async function selectEvent(eventId) {
        await saveDocumentNow();
        state.currentEventId = eventId;
        state.editing = false;
        dom.events.querySelectorAll('.tn-event-row').forEach(el => {
            el.classList.toggle('active', el.dataset.id === eventId);
        });
        dom.content.innerHTML = '<div class="tn-empty">加载中…</div>';

        try {
            const ev = await fetchJSON(`/api/notes/${encodeURIComponent(state.currentCode)}/events/${encodeURIComponent(eventId)}`);
            renderContent(ev);
            dom.editBtn.disabled = false;
            dom.deleteBtn.disabled = false;
            dom.addCardBtn.disabled = true;
        } catch (e) {
            dom.content.innerHTML = `<div class="tn-empty tn-error">加载失败: ${escapeHtml(e.message)}</div>`;
        }
    }

    function renderContent(ev) {
        dom.contentTitle.textContent = `${ev.event_type} · ${formatDateTime(ev.ts)}`;
        const meta = [];
        if (ev.side) meta.push(ev.side === 'buy' ? '买' : '卖');
        if (ev.price !== null && ev.price !== undefined) meta.push(`@${ev.price}`);
        if (ev.qty !== null && ev.qty !== undefined) meta.push(`x ${ev.qty}`);
        const metaLine = meta.length ? `<div class="tn-content-meta">${escapeHtml(meta.join(' '))}</div>` : '';
        const feeLine = feeRowHtml(ev);
        const sourceLabel = ev.source === 'broker' ? '系统记录' : (ev.source === 'ai' ? 'AI' : '手动');
        const sourceLine = `<div class="tn-content-source">来源: ${escapeHtml(sourceLabel)}${ev.author ? ` · ${escapeHtml(ev.author)}` : ''}</div>`;
        const titleLine = ev.title ? `<div class="tn-content-title-text">${escapeHtml(ev.title)}</div>` : '';
        const sections = [];
        if (ev.content) {
            sections.push(`<h4 class="tn-content-section">对内</h4><div class="tn-content-md">${renderMarkdown(ev.content)}</div>`);
        }
        if (ev.content_external) {
            sections.push(`<h4 class="tn-content-section">对外</h4><div class="tn-content-md">${renderMarkdown(ev.content_external)}</div>`);
        }
        const body = sections.length
            ? sections.join('')
            : '<div class="tn-empty">（暂无正文，点 ✎ 编辑添加）</div>';
        dom.content.innerHTML = metaLine + feeLine + titleLine + sourceLine + body;

    function clearContent() {
        dom.contentTitle.textContent = '正文';
        dom.editBtn.disabled = true;
        dom.deleteBtn.disabled = true;
        dom.addCardBtn.disabled = true;

    function isoToLocalDatetimeValue(iso) {
        // Convert backend ISO (UTC) to a 'YYYY-MM-DDTHH:mm' string in local TZ
        // for a datetime-local input.
        const d = new Date(iso);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    async function enterEditMode() {

        state.editing = true;
        // Remember the prefilled ts string so saveEdit can detect whether the
        // user actually changed it. The input has minute precision; if we

        // Type options: always 买入/卖出/逆回购, plus current type if it's something

        dom.content.innerHTML = `
            <div class="tn-edit-form">

                    <select id="tnEditType">${typeOptions}</select>
                </label>
                <label>时间
                    <input type="datetime-local" id="tnEditTs" step="60" value="${isoToLocalDatetimeValue(ev.ts)}" />

                <div id="tnEditTradeFields"${isTrade ? '' : ' hidden'}>
                    <div class="tn-modal-row">

    async function saveEdit() {
        const title = document.getElementById('tnEditTitle').value;
        const content = document.getElementById('tnEditContent').value;
        const contentExternal = document.getElementById('tnEditContentExternal').value;
        const eventType = document.getElementById('tnEditType').value;
        const tsRaw = document.getElementById('tnEditTs').value;
        const tsMs = tsRaw ? new Date(tsRaw).getTime() : null;
        if (tsRaw && Number.isNaN(tsMs)) {
            alert('时间格式错误'); return;
        }
        const code = state.currentCode;
        const eventId = state.currentEventId;
        const body = { title, content, content_external: contentExternal, event_type: eventType };
        // Only send ts_ms when the user actually changed the field — otherwise
        // the minute-precision round-trip drops the original sub-minute part
        // and the backend treats it as a ts change.
        if (tsMs !== null && tsRaw !== state.editTsOriginal) body.ts_ms = tsMs;
        if (eventType === '买入' || eventType === '卖出' || eventType === '逆回购') {
            // 逆回购不发 side —— 后端在类型改为 逆回购 时自动把 side 清成 NULL。
            if (eventType !== '逆回购') {
                body.side = eventType === '买入' ? 'buy' : 'sell';
            }
            const priceEl = document.getElementById('tnEditPrice');
            const qtyEl = document.getElementById('tnEditQty');
            const priceRaw = priceEl ? priceEl.value.trim() : '';
            const qtyRaw = qtyEl ? qtyEl.value.trim() : '';
            if (priceRaw) {
                const p = Number(priceRaw);
                if (Number.isNaN(p) || p < 0) { alert('价格格式错误'); return; }
                body.price = p;
            } else {
                body.price = null;  // explicit clear → 市价
            }
            if (qtyRaw) {
                const q = parseInt(qtyRaw, 10);
                if (Number.isNaN(q) || q < 0) { alert('数量格式错误'); return; }
                body.qty = q;
            } else {
                body.qty = null;
            }
            // 费用 + 股息：空 → null（显式清空到 NULL），非空 → 数值。
            // 5 个 input 始终在 DOM 里（卖出 only 那 3 个只是隐藏不删），所以编辑买入
            // 事件时 stamp_tax/dividend/realized_pnl 会读到隐藏 input 的值并照样回传 ——
            // 买入事件的旧 sell-only 列通常本就是 NULL，回写 null 是 no-op；如果是
            // 卖出→买入 类型切换且旧值非空，会顺手清掉（语义上也对，sell-only 字段
            // 对买入没意义）。
            const editFeeMap = [
                ['commission', 'tnEditCommission', '佣金', false],
                ['transfer_fee', 'tnEditTransferFee', '过户费', false],
                ['stamp_tax', 'tnEditStampTax', '印花税', false],
                ['dividend', 'tnEditDividend', '股息/股息税', true],  // 可负：派息−已扣税净额
                ['realized_pnl', 'tnEditRealizedPnl', '平仓收益', true],  // can be negative
            ];
            for (const [key, id, label, allowNeg] of editFeeMap) {
                const el = document.getElementById(id);
                const raw = el ? el.value.trim() : '';
                if (raw === '') {
                    body[key] = null;
                } else {
                    const v = Number(raw);
                    if (Number.isNaN(v) || (!allowNeg && v < 0)) {
                        alert(`${label}格式错误`); return;
                    }
                    body[key] = v;
                }
            }
            // 逆回购只登记收益，费项/股息不适用——隐藏 input 里残留的旧值一律清空。
            if (eventType === '逆回购') {
                body.commission = null;
                body.transfer_fee = null;
                body.stamp_tax = null;
                body.dividend = null;
            }
        }
        try {
            await fetchJSON(`/api/notes/${encodeURIComponent(code)}/events/${encodeURIComponent(eventId)}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            // Refresh middle pane (selectStock resets currentEventId to null,
            // so capture eventId above and re-pass it explicitly).
            await selectStock(code);
            await selectEvent(eventId);
        } catch (e) {
            alert('保存失败: ' + e.message);
        }
    }

    async function deleteCurrentEvent() {
        if (!state.currentCode || !state.currentEventId) return;
        if (!confirm('确认删除该事件？（彻底删除，不可恢复）')) return;
        try {
            await fetchJSON(`/api/notes/${encodeURIComponent(state.currentCode)}/events/${encodeURIComponent(state.currentEventId)}`, {
                method: 'DELETE',
            });
            const code = state.currentCode;
            state.currentEventId = null;
            clearContent();
            await selectStock(code);
        } catch (e) {
            alert('删除失败: ' + e.message);
        }
    }

    // ---- 平仓收益计算 ----
    // 策略口径：一买对一卖（一卖可能分多次平仓）。
    // 本次卖出 → 找它之前最近的一次 buy 事件 → 按 sell_qty/buy_qty 比例分摊买入成本。
    //   ratio   = sell_qty / buy_qty
    //   sellNet = sell_price * sell_qty − (commission + transfer_fee + stamp_tax)
    //   buyPart = buy.price * sell_qty + ratio * ((buy.commission||0) + (buy.transfer_fee||0))
    //   pnl     = sellNet − buyPart + (dividend||0)
    function findLatestBuyBefore(events, beforeMs, excludeEventId) {
        let latest = null;
        for (const ev of events) {
            if (excludeEventId && ev.event_id === excludeEventId) continue;
            const isBuy = (ev.side === 'buy') || (ev.event_type === '买入');
            if (!isBuy) continue;
            const t = new Date(ev.ts).getTime();
            if (!(t < beforeMs)) continue;
            if (latest === null || t > new Date(latest.ts).getTime()) {
                latest = ev;
            }
        }
        return latest;
    }

    function computeRealizedPnl(sellInputs, buy) {
        const ratio = sellInputs.qty / buy.qty;
        const sellGross = sellInputs.price * sellInputs.qty;
        const sellFees = (sellInputs.commission || 0)
            + (sellInputs.transfer_fee || 0)
            + (sellInputs.stamp_tax || 0);
        const buyMatchedAmt = buy.price * sellInputs.qty;
        const buyMatchedFees = ratio * ((buy.commission || 0) + (buy.transfer_fee || 0));
        return sellGross - sellFees - (buyMatchedAmt + buyMatchedFees) + (sellInputs.dividend || 0);
    }

    function readSellInputsFromIds(ids) {
        const num = (id) => {
            const el = document.getElementById(id);
            if (!el) return NaN;
            const raw = el.value.trim();
            return raw === '' ? NaN : Number(raw);
        };
        return {
            price: num(ids.price),
            qty: num(ids.qty),
            commission: num(ids.commission),
            transfer_fee: num(ids.transferFee),
            stamp_tax: num(ids.stampTax),
            dividend: num(ids.dividend),
        };
    }

    function doCalcPnl({ ids, sellTsMs, excludeEventId, targetInputId }) {
        const inputs = readSellInputsFromIds(ids);
        if (Number.isNaN(inputs.price) || Number.isNaN(inputs.qty)) {
            alert('请先填写本次卖出的价格和数量');
            return;
        }
        if (inputs.qty <= 0 || inputs.price < 0) {
            alert('价格 / 数量 不合法');
            return;
        }
        const buy = findLatestBuyBefore(state.documentEvents || [], sellTsMs, excludeEventId);
        if (!buy) {
            alert('未找到对应买入事件，请先记录买入');
            return;
        }
        if (buy.price === null || buy.price === undefined || !buy.qty) {
            alert('上一次买入缺少价格或数量，无法计算');
            return;
        }
        if (inputs.qty > buy.qty) {
            alert(`本次卖出 ${inputs.qty} 股，超过上一次买入 ${buy.qty} 股，请检查`);
            return;
        }
        const pnl = computeRealizedPnl(inputs, buy);
        const targetEl = document.getElementById(targetInputId);
        if (targetEl) targetEl.value = pnl.toFixed(2);
    }

    function calcPnlInNewMode() {
        // 新建模式：sell ts = 表单里填的（默认 now）；不排除任何 event
        const tsRaw = dom.newTs.value;
        const sellTsMs = tsRaw ? new Date(tsRaw).getTime() : Date.now();
        doCalcPnl({
            ids: {
                price: 'tnNewPrice',
                qty: 'tnNewQty',
                commission: 'tnNewCommission',
                transferFee: 'tnNewTransferFee',
                stampTax: 'tnNewStampTax',
                dividend: 'tnNewDividend',
            },
            sellTsMs,
            excludeEventId: null,
            targetInputId: 'tnNewRealizedPnl',
        });
    }

    function calcPnlInEditMode(originalEv) {
        // 编辑模式：sell ts = 表单里的 ts（用户可能改过）；排除自身（本次 sell 不算先前事件）
        const tsRaw = document.getElementById('tnEditTs').value;
        const sellTsMs = tsRaw ? new Date(tsRaw).getTime() : new Date(originalEv.ts).getTime();
        doCalcPnl({
            ids: {
                price: 'tnEditPrice',
                qty: 'tnEditQty',
                commission: 'tnEditCommission',
                transferFee: 'tnEditTransferFee',
                stampTax: 'tnEditStampTax',
                dividend: 'tnEditDividend',
            },
            sellTsMs,
            excludeEventId: originalEv.event_id,
            targetInputId: 'tnEditRealizedPnl',
        });
    }

    function nowLocalDatetimeValue() {
        // datetime-local wants 'YYYY-MM-DDTHH:mm' in *local* time, no TZ.
        const d = new Date();
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function openNewEventModal() {
        if (!state.currentCode) return;
        dom.newType.value = '买入';
        dom.newTs.value = nowLocalDatetimeValue();
        dom.newTitle.value = '';
        dom.newPrice.value = '';
        dom.newQty.value = '';
        dom.newCommission.value = '';
        dom.newTransferFee.value = '';
        dom.newStampTax.value = '';
        dom.newDividend.value = '';
        dom.newRealizedPnl.value = '';
        dom.newContent.value = '';
        dom.newContentExternal.value = '';
        updateNewTradeFieldsVisibility();
        dom.modal.hidden = false;
        dom.newContent.focus();
    }

    function updateNewTradeFieldsVisibility() {
        const t = dom.newType.value;
        const isTrade = (t === '买入' || t === '卖出' || t === '逆回购');
        const repo = (t === '逆回购');
        dom.newTradeFields.hidden = !isTrade;
        // 印花税/股息/平仓收益 仅卖出显示；逆回购只显示 收益(计算按钮不适用)。
        dom.newSellFields.hidden = !(t === '卖出' || repo);
        document.getElementById('tnNewCommissionLabel').hidden = repo;
        document.getElementById('tnNewTransferFeeLabel').hidden = repo;
        document.getElementById('tnNewStampTaxLabel').hidden = repo;
        document.getElementById('tnNewDividendLabel').hidden = repo;
        document.getElementById('tnNewCalcPnlBtn').hidden = repo;
        document.getElementById('tnNewPnlLabelText').textContent = repo ? '收益' : '平仓收益';
    }

    async function openEditStockCodeFlow() {
        if (!state.currentCode) return;
        const oldCode = state.currentCode;
        const raw = prompt(`改正股票代码（当前 ${oldCode}）`, oldCode);
        if (!raw) return;
        const newCode = raw.trim().split('.')[0].toUpperCase();
        if (!/^\d{6}$/.test(newCode)) {
            alert('代码格式应为 6 位数字（如 002008）');
            return;
        }
        if (newCode === oldCode) return;
        try {
            const data = await fetchJSON(`/api/notes/stocks/${encodeURIComponent(oldCode)}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_code: newCode }),
            });
            state.currentCode = newCode;
            state.currentEventId = null;
            await loadStocks();
            await selectStock(newCode);
            alert(`已迁移 ${data.moved} 条事件到 ${newCode}`);
        } catch (e) {
            alert('改正失败: ' + e.message);
        }
    }

    function openAddStockFlow() {
        const raw = prompt('输入股票代码（例 002008 或 002008.SZ）');
        if (!raw) return;
        const code = raw.trim().split('.')[0].toUpperCase();
        if (!/^\d{6}$/.test(code)) {
            alert('代码格式应为 6 位数字（如 002008）');
            return;
        }
        state.currentCode = code;
        state.currentEventId = null;
        // Clear cached events from any previously-selected stock so the calc-PnL
        // button doesn't accidentally find a buy from a different ticker.
        state.documentEvents = [];
        state.documentCards = [];
        dom.eventsTitle.textContent = `事件 · ${code}`;
        dom.addEventBtn.disabled = false;
        dom.events.innerHTML = '<div class="tn-empty">未保存事件前不在列表中</div>';
        clearContent();
        openNewEventModal();
    }

    async function saveNewEvent() {
        const event_type = dom.newType.value;
        const title = dom.newTitle.value;
        const content = dom.newContent.value;
        const content_external = dom.newContentExternal.value;
        if (!event_type) { alert('请选择类型'); return; }
        // datetime-local input is in local TZ; new Date(value) parses as
        // local and getTime() returns epoch UTC ms — what the backend wants.
        const tsRaw = dom.newTs.value;
        const ts_ms = tsRaw ? new Date(tsRaw).getTime() : null;
        if (tsRaw && Number.isNaN(ts_ms)) {
            alert('时间格式错误'); return;
        }
        const body = { event_type, title, content, content_external, author: 'user', source: 'user' };
        if (ts_ms !== null) body.ts_ms = ts_ms;
        if (event_type === '买入' || event_type === '卖出' || event_type === '逆回购') {
            // 逆回购不发 side——它不算买卖，后端建行时 side 留 NULL。
            if (event_type !== '逆回购') {
                body.side = event_type === '买入' ? 'buy' : 'sell';
            }
            const priceRaw = dom.newPrice.value.trim();
            const qtyRaw = dom.newQty.value.trim();
            if (priceRaw) {
                const p = Number(priceRaw);
                if (Number.isNaN(p) || p < 0) { alert('价格格式错误'); return; }
                body.price = p;
            }
            if (qtyRaw) {
                const q = parseInt(qtyRaw, 10);
                if (Number.isNaN(q) || q < 0) { alert('数量格式错误'); return; }
                body.qty = q;
            }
            // 5 个数值费用/股息/收益字段：留空不发，非空校验后发。买入只用前 2 个；
            // 逆回购一个费项都不发，只发收益。
            // [key, el, label, allowNeg]. 股息/股息税 可负（派息−已扣税）。
            const feeMap = [];
            if (event_type !== '逆回购') {
                feeMap.push(
                    ['commission', dom.newCommission, '佣金', false],
                    ['transfer_fee', dom.newTransferFee, '过户费', false],
                );
            }
            if (event_type === '卖出') {
                feeMap.push(
                    ['stamp_tax', dom.newStampTax, '印花税', false],
                    ['dividend', dom.newDividend, '股息/股息税', true],
                );
            }
            for (const [key, el, label, allowNeg] of feeMap) {
                const raw = el.value.trim();
                if (raw === '') continue;
                const v = Number(raw);
                if (Number.isNaN(v) || (!allowNeg && v < 0)) {
                    alert(`${label}格式错误`); return;
                }
                body[key] = v;
            }
            // realized_pnl 可正可负，单独处理（卖出=平仓收益，逆回购=收益）
            if (event_type === '卖出' || event_type === '逆回购') {
                const pnlRaw = dom.newRealizedPnl.value.trim();
                if (pnlRaw !== '') {
                    const pnl = Number(pnlRaw);
                    if (Number.isNaN(pnl)) { alert('收益格式错误'); return; }
                    body.realized_pnl = pnl;
                }
            }
        }
        try {
            const data = await fetchJSON(`/api/notes/${encodeURIComponent(state.currentCode)}/events`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            dom.modal.hidden = true;
            const code = state.currentCode;
            await selectStock(code);
            await selectEvent(data.event_id);
            // Also refresh stocks pane for ordering
            loadStocks();
        } catch (e) {
            alert('保存失败: ' + e.message);
        }
    }

    function setCardModalMode(editing) {
        dom.cardModalTitle.textContent = editing ? '编辑卡片' : '插入带时间的卡片';
        dom.cardSave.textContent = editing ? '保存' : '插入';
        dom.cardDelete.hidden = !editing;
    }

    function openCardModal() {
        if (!state.currentCode || state.currentEventId) return;
        state.editingCardId = null;
        setCardModalMode(false);
        dom.cardTs.value = nowLocalDatetimeValue();
        dom.cardContent.value = '';
        dom.cardModal.hidden = false;
        setTimeout(() => dom.cardContent.focus(), 0);
    }

    function openCardEditModal(card) {
        if (!state.currentCode) return;
        state.editingCardId = card.card_id;
        setCardModalMode(true);
        dom.cardTs.value = isoToLocalDatetimeValue(card.ts);
        dom.cardContent.value = card.content || '';
        dom.cardModal.hidden = false;
        setTimeout(() => dom.cardContent.focus(), 0);
    }

    function closeCardModal() {
        dom.cardModal.hidden = true;
        state.editingCardId = null;
    }

    async function saveCard() {
        const tsRaw = dom.cardTs.value;
        if (!tsRaw) { alert('请选择时间'); return; }
        const ts = new Date(tsRaw);
        if (Number.isNaN(ts.getTime())) { alert('时间格式错误'); return; }
        const content = dom.cardContent.value || '';
        const tsMs = ts.getTime();
        const code = state.currentCode;
        const editingId = state.editingCardId;

        try {
            if (editingId) {
                await fetchJSON(`/api/notes/${encodeURIComponent(code)}/cards/${encodeURIComponent(editingId)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, ts_ms: tsMs }),
                });
            } else {
                await fetchJSON(`/api/notes/${encodeURIComponent(code)}/cards`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, ts_ms: tsMs }),
                });
            }
            closeCardModal();
            await selectStock(code);
        } catch (e) {
            alert('保存失败: ' + e.message);
        }
    }

    async function deleteCard() {
        const editingId = state.editingCardId;
        if (!editingId) return;
        if (!confirm('确认删除该卡片？（彻底删除，不可恢复）')) return;
        const code = state.currentCode;
        try {
            await fetchJSON(`/api/notes/${encodeURIComponent(code)}/cards/${encodeURIComponent(editingId)}`, {
                method: 'DELETE',
            });
            closeCardModal();
            await selectStock(code);
        } catch (e) {
            alert('删除失败: ' + e.message);
        }
    }

    async function backfillToday() {
        dom.backfillTodayBtn.disabled = true;
        try {
            const data = await fetchJSON('/api/notes/backfill-today', { method: 'POST' });
            alert(`回补完成：新增 ${data.written} 条，跳过 ${data.skipped} 条（已存在）`);
            loadStocks();
        } catch (e) {
            alert('回补失败: ' + e.message);
        } finally {
            dom.backfillTodayBtn.disabled = false;
        }
    }

    // Wire up
    dom.refreshStocksBtn.addEventListener('click', loadStocks);
    dom.backfillTodayBtn.addEventListener('click', backfillToday);
    dom.addStockBtn.addEventListener('click', openAddStockFlow);
    dom.editStockCodeBtn.addEventListener('click', openEditStockCodeFlow);
    dom.filterDate.addEventListener('change', loadStocks);
    dom.addEventBtn.addEventListener('click', openNewEventModal);
    dom.editBtn.addEventListener('click', enterEditMode);
    dom.deleteBtn.addEventListener('click', deleteCurrentEvent);
    dom.newType.addEventListener('change', updateNewTradeFieldsVisibility);
    dom.newCancel.addEventListener('click', () => { dom.modal.hidden = true; });
    dom.newSave.addEventListener('click', saveNewEvent);
    dom.newCalcPnlBtn.addEventListener('click', calcPnlInNewMode);
    dom.modal.addEventListener('click', (e) => { if (e.target === dom.modal) dom.modal.hidden = true; });
    dom.addCardBtn.addEventListener('click', openCardModal);
    dom.cardCancel.addEventListener('click', closeCardModal);
    dom.cardSave.addEventListener('click', saveCard);
    dom.cardDelete.addEventListener('click', deleteCard);
    dom.cardModal.addEventListener('click', (e) => { if (e.target === dom.cardModal) closeCardModal(); });

    // Export — default range = last 30 days, ending today (Beijing local).
    function localDateStr(d) {
        const yy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yy}-${mm}-${dd}`;
    }
    (function initExportDates() {
        const today = new Date();
        const start = new Date(today.getTime() - 30 * 24 * 3600 * 1000);
        dom.exportStart.value = localDateStr(start);
        dom.exportEnd.value = localDateStr(today);
    })();
    dom.exportBtn.addEventListener('click', async () => {
        const start = dom.exportStart.value;
        const end = dom.exportEnd.value;
        if (!start || !end) { alert('请选择开始/结束日期'); return; }
        if (start > end) { alert('开始日期必须 ≤ 结束日期'); return; }
        const origText = dom.exportBtn.textContent;
        dom.exportBtn.disabled = true;
        dom.exportBtn.textContent = '导出中…';
        try {
            const r = await fetch(`/api/notes/export?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
            if (!r.ok) {
                let msg = `导出失败 (${r.status})`;
                try { const j = await r.json(); if (j.detail) msg += `: ${j.detail}`; } catch (_) {}
                alert(msg);
                return;
            }
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `trade_notes_${start}_${end}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        } catch (e) {
            alert('导出失败: ' + (e && e.message ? e.message : e));
        } finally {
            dom.exportBtn.disabled = false;
            dom.exportBtn.textContent = origText;
        }
    });

    loadStocks();
})();
</script>
