name: Lambda Kline Bootstrap

on:
  push:
    branches: [refactor/cleanup-v15-only]
    paths:
      - 'lambda-kline/**'
      - '.github/workflows/lambda-kline-bootstrap.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    if: vars.LAMBDA_KLINE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Lambda image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_LAMBDA_KLINE_ECR }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ github.sha }}"
          IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker build --platform linux/amd64 -t "${IMAGE_URI}" -t "${IMAGE_LATEST}" lambda-kline
          docker push "${IMAGE_URI}"
          docker push "${IMAGE_LATEST}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      # Pushing to ECR doesn't update the running Lambda — we have to point the
      # function at the new image explicitly. `wait function-updated` lets
      # subsequent invokes hit the new code.
      - name: Update Lambda function code
        env:
          FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_KLINE_FUNCTION }}
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --image-uri "${IMAGE_URI}" \
            --publish \
            > /dev/null
          aws lambda wait function-updated \
            --function-name "${FUNCTION_NAME}"
          echo "Lambda ${FUNCTION_NAME} now serving ${IMAGE_URI}"
